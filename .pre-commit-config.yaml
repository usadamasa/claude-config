repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck
        language: system
        entry: shellcheck
        types: [shell]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
