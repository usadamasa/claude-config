version: '3'

includes:
  go:
    taskfile: ./cmd/Taskfile.yml
    dir: ./cmd
    optional: true

tasks:
  test:
    desc: テストを実行 (bats + Go + shellcheck)
    cmds:
      - echo "🧪 テストを実行中..."
      - task: shellcheck
      - bats tests/
      - task: go:test
      - echo "✅ テスト完了"

  shellcheck:
    desc: 全シェルスクリプトの shellcheck を実行
    cmds:
      - find . \( -name "*.sh" -o -name "*.bats" -o -name ".envrc" \) -not -path "./.git/*" | xargs shellcheck

  install-hooks:
    desc: pre-commit の git hooks をインストール
    cmds:
      - |
        if ! command -v pre-commit &>/dev/null; then
          echo "⏭️ pre-commit が見つかりません。スキップします。"
          exit 0
        fi
        GIT_DIR=$(git rev-parse --git-dir 2>/dev/null)
        GIT_COMMON=$(git rev-parse --git-common-dir 2>/dev/null)
        if [ "$GIT_DIR" != "$GIT_COMMON" ]; then
          # worktree 環境: core.hooksPath で共通ディレクトリを指定
          HOOKS_DIR="$GIT_COMMON/hooks"
          git config core.hooksPath "$HOOKS_DIR"
          pre-commit install --hook-type pre-commit --install-hooks
          echo "  ✓ pre-commit hooks installed (worktree: $HOOKS_DIR)"
        else
          pre-commit install --install-hooks
          echo "  ✓ pre-commit hooks installed"
        fi

  setup:
    desc: Claude設定のファイルレベル symlink をセットアップ
    deps: [build:hooks-bin]
    cmds:
      # マイグレーション: ディレクトリ symlink → 実ディレクトリ
      - |
        if [ -L "$HOME/.claude" ]; then
          echo "🔄 ~/.claude をディレクトリ symlink から実ディレクトリに移行中..."
          OLD_TARGET=$(readlink "$HOME/.claude")
          case "$OLD_TARGET" in
            /*) ;;
            *)  OLD_TARGET="$(cd "$(dirname "$HOME/.claude")" && cd "$OLD_TARGET" && pwd)" ;;
          esac
          rm "$HOME/.claude"
          cp -a "$OLD_TARGET" "$HOME/.claude"
          echo "  📦 内容をコピーしました: $OLD_TARGET → $HOME/.claude"
        fi
      - mkdir -p "$HOME/.claude/skills"
      # CLAUDE-global.md → ~/.claude/CLAUDE.md (名前が異なる特殊マッピング)
      - |
        if [ -f "{{.TASKFILE_DIR}}/dotclaude/CLAUDE-global.md" ]; then
          ln -sfn "{{.TASKFILE_DIR}}/dotclaude/CLAUDE-global.md" "$HOME/.claude/CLAUDE.md"
          echo "  ✓ CLAUDE-global.md → CLAUDE.md"
        fi
      # dotclaude/ 配下のファイルの symlink
      - |
        for file in dotclaude/settings.json dotclaude/env.sh; do
          if [ -f "{{.TASKFILE_DIR}}/$file" ]; then
            basename=$(basename "$file")
            ln -sfn "{{.TASKFILE_DIR}}/$file" "$HOME/.claude/$basename"
            echo "  ✓ $basename"
          fi
        done
      # dotclaude/ 配下のディレクトリの symlink
      - |
        for dir in dotclaude/hooks dotclaude/bin; do
          if [ -d "{{.TASKFILE_DIR}}/$dir" ]; then
            basename=$(basename "$dir")
            target="$HOME/.claude/$basename"
            if [ -d "$target" ] && [ ! -L "$target" ]; then
              rm -rf "$target"
            fi
            ln -sfn "{{.TASKFILE_DIR}}/$dir" "$target"
            echo "  ✓ $basename/"
          fi
        done
      # dotclaude/skills/ 配下の全スキルを自動検出 & symlink
      - |
        for skill_dir in "{{.TASKFILE_DIR}}/dotclaude/skills"/*/; do
          [ -d "$skill_dir" ] || continue
          skill_name=$(basename "$skill_dir")
          target="$HOME/.claude/skills/$skill_name"
          if [ -d "$target" ] && [ ! -L "$target" ]; then
            rm -rf "$target"
          fi
          ln -sfn "$skill_dir" "$target"
          echo "  ✓ skills/$skill_name/"
        done
      - task: install-hooks
      - echo "✅ Claude設定をセットアップしました"

  status:
    desc: Claude設定の状態を確認
    cmds:
      - |
        echo "Claude設定:"
        echo "  ディレクトリ: $(test -d "$HOME/.claude" && ! test -L "$HOME/.claude" && echo '✓ 実ディレクトリ' || echo '✗')"
        echo "  CLAUDE.md (← CLAUDE-global.md): $(test -L "$HOME/.claude/CLAUDE.md" && echo '✓' || echo '✗')"
        echo "  settings.json: $(test -L "$HOME/.claude/settings.json" && echo '✓' || echo '✗')"
        echo "  hooks: $(test -L "$HOME/.claude/hooks" && echo '✓' || echo '✗')"
        echo "  bin: $(test -L "$HOME/.claude/bin" && echo '✓' || echo '✗')"
        echo "  env.sh: $(test -L "$HOME/.claude/env.sh" && echo '✓' || echo '✗')"
        echo "  skills:"
        for skill_dir in "{{.TASKFILE_DIR}}/dotclaude/skills"/*/; do
          [ -d "$skill_dir" ] || continue
          skill_name=$(basename "$skill_dir")
          echo "    $skill_name: $(test -L "$HOME/.claude/skills/$skill_name" && echo '✓' || echo '✗')"
        done

  clean:
    desc: Claude設定の symlink を削除
    cmds:
      - rm -f "$HOME/.claude/CLAUDE.md" "$HOME/.claude/settings.json" "$HOME/.claude/env.sh"
      - |
        for dir in hooks bin; do
          target="$HOME/.claude/$dir"
          if [ -L "$target" ]; then
            rm -f "$target"
          elif [ -d "$target" ]; then
            rm -rf "$target"
          fi
        done
      - |
        for skill_dir in "{{.TASKFILE_DIR}}/dotclaude/skills"/*/; do
          [ -d "$skill_dir" ] || continue
          skill_name=$(basename "$skill_dir")
          target="$HOME/.claude/skills/$skill_name"
          if [ -L "$target" ]; then
            rm -f "$target"
          elif [ -d "$target" ]; then
            rm -rf "$target"
          fi
        done
      - echo "🗑️ Claude設定の symlink を削除しました"

  build:hooks-bin:
    desc: フックが使う Go バイナリをビルド (ホスト用)
    dir: cmd
    cmds:
      - mkdir -p ../dotclaude/bin
      - go build -o ../dotclaude/bin/realpath ./realpath
      - go build -o ../dotclaude/bin/guard-home-dir ./guard-home-dir
    sources:
      - cmd/realpath/*.go
      - cmd/guard-home-dir/*.go
      - cmd/internal/**/*.go
    generates:
      - dotclaude/bin/realpath
      - dotclaude/bin/guard-home-dir

  build:docker-bin:
    desc: Docker (Linux) 用 Go バイナリをクロスコンパイル
    dir: cmd
    cmds:
      - mkdir -p ../docker/bin
      - GOOS=linux go build -o ../docker/bin/realpath ./realpath
      - GOOS=linux go build -o ../docker/bin/guard-home-dir ./guard-home-dir
      - GOOS=linux go build -o ../docker/bin/analyze-permissions ./analyze-permissions
      - GOOS=linux go build -o ../docker/bin/analyze-webfetch ./analyze-webfetch
      - GOOS=linux go build -o ../docker/bin/analyze-tokens ./analyze-tokens
    sources:
      - cmd/realpath/*.go
      - cmd/guard-home-dir/*.go
      - cmd/analyze-permissions/*.go
      - cmd/analyze-webfetch/*.go
      - cmd/analyze-tokens/*.go
      - cmd/internal/**/*.go
    generates:
      - docker/bin/realpath
      - docker/bin/guard-home-dir
      - docker/bin/analyze-permissions
      - docker/bin/analyze-webfetch
      - docker/bin/analyze-tokens

  docker:verify:
    desc: Dockerコンテナで現在のclaude-config設定を検証
    deps: [build:docker-bin]
    cmds:
      - ./docker/verify.sh {{.CLI_ARGS}}

  docker:clean:
    desc: 検証用Dockerリソースを削除
    cmds:
      - docker image rm -f claude-config-verify || true
      - docker volume rm claude-config-verify-local || true
      - docker volume rm claude-config-verify-dotclaude || true
      - rm -rf "${XDG_CACHE_HOME:-$HOME/.cache}/claude-config-verify"
